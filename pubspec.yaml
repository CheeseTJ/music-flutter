name: music_app
description: Personal Cloud Music App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.0
  go_router: ^14.0.0
  just_audio: ^0.9.38
  audio_service: ^0.18.15
  dio: ^5.4.0
  flutter_svg: ^2.0.10
  shared_preferences: ^2.2.3
  path_provider: ^2.1.2
  crypto: ^3.0.3
  file_picker: ^8.0.0
  cached_network_image: ^3.4.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icons/logo.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/kugou_key.gz
    - assets/icons/
