<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music App Icon — F Variants</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    gap: 48px;
    background: #0A0C10;
    font-family: system-ui, -apple-system, sans-serif;
    padding: 56px 24px 80px;
  }

  h1 {
    color: #E8E0D5;
    font-size: 24px;
    font-weight: 600;
    letter-spacing: -0.5px;
  }

  .row {
    display: flex;
    gap: 56px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .card {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
  }

  .card-label {
    color: #E8E0D5;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }

  .icon-lg {
    width: 200px; height: 200px;
    border-radius: 22.2%;
    overflow: hidden;
    background: #0A0C10;
    box-shadow: 0 0 0 1px rgba(255,255,255,0.06), 0 4px 24px rgba(0,0,0,0.5);
    display: flex; align-items: center; justify-content: center;
  }

  .icon-sm {
    width: 76px; height: 76px;
    border-radius: 22.2%;
    overflow: hidden;
    background: #0A0C10;
    box-shadow: 0 0 0 1px rgba(255,255,255,0.06), 0 2px 12px rgba(0,0,0,0.4);
    display: flex; align-items: center; justify-content: center;
  }

  .icon-lg svg, .icon-sm svg { width: 100%; height: 100%; }

  .tag {
    color: #D4A853; font-size: 11px; font-weight: 600;
    letter-spacing: 0.5px; padding: 3px 10px;
    border: 1px solid rgba(212,168,83,0.25); border-radius: 4px;
  }
  .size-label { color: #8B8578; font-size: 10px; letter-spacing: 0.5px; }
  .desc { color: #8B8578; font-size: 12px; text-align: center; max-width: 200px; line-height: 1.7; }
</style>
</head>
<body>

<h1>Night Listening — Two Variants</h1>

<div class="row">

  <!-- ============ F1: Pure Headphones ============ -->
  <div class="card">
    <span class="card-label">F1 · Pure Headphones</span>
    <div class="icon-lg">
      <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="bgF1" cx="50%" cy="55%" r="50%">
            <stop offset="0%" stop-color="#E8C97A" stop-opacity="0.10"/>
            <stop offset="40%" stop-color="#D4A853" stop-opacity="0.04"/>
            <stop offset="100%" stop-color="#0A0C10" stop-opacity="0"/>
          </radialGradient>
          <radialGradient id="glowF1" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#FFF5E0" stop-opacity="0.50"/>
            <stop offset="30%" stop-color="#E8C97A" stop-opacity="0.18"/>
            <stop offset="100%" stop-color="#D4A853" stop-opacity="0"/>
          </radialGradient>
          <linearGradient id="hpGradF1" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#E8C97A"/>
            <stop offset="50%" stop-color="#D4A853"/>
            <stop offset="100%" stop-color="#B8933E"/>
          </linearGradient>
        </defs>
        <rect width="200" height="200" rx="44" fill="#0A0C10"/>
        <circle cx="100" cy="100" r="92" fill="url(#bgF1)"/>
        <circle cx="100" cy="108" r="30" fill="url(#glowF1)"/>

        <!-- Headband arc -->
        <path d="M 56 62 C 56 28, 144 28, 144 62" stroke="url(#hpGradF1)" stroke-width="3.5" stroke-linecap="round" fill="none" opacity="0.92"/>
        <!-- Left earcup -->
        <rect x="46" y="78" width="16" height="36" rx="6" fill="#D4A853" opacity="0.90"/>
        <rect x="42" y="80" width="5" height="32" rx="2.5" fill="#B8933E" opacity="0.85"/>
        <!-- Right earcup -->
        <rect x="138" y="78" width="16" height="36" rx="6" fill="#D4A853" opacity="0.90"/>
        <rect x="153" y="80" width="5" height="32" rx="2.5" fill="#B8933E" opacity="0.85"/>

        <!-- Subtle mini spectrum bars below -->
        <rect x="88" y="130" width="1.8" height="5" rx="0.9" fill="#E8C97A" opacity="0.35"/>
        <rect x="92" y="126" width="1.8" height="9" rx="0.9" fill="#E8C97A" opacity="0.48"/>
        <rect x="96" y="122" width="1.8" height="13" rx="0.9" fill="#E8C97A" opacity="0.60"/>
        <rect x="100" y="120" width="1.8" height="15" rx="0.9" fill="#E8C97A" opacity="0.65"/>
        <rect x="104" y="122" width="1.8" height="13" rx="0.9" fill="#E8C97A" opacity="0.60"/>
        <rect x="108" y="126" width="1.8" height="9" rx="0.9" fill="#E8C97A" opacity="0.48"/>
        <rect x="112" y="130" width="1.8" height="5" rx="0.9" fill="#E8C97A" opacity="0.35"/>
      </svg>
    </div>
    <span class="tag">Clean · Minimal</span>
    <p class="desc">Pure headphones in warm glow. No distractions.</p>
    <div class="icon-sm">
      <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="bgF1s" cx="50%" cy="55%" r="50%">
            <stop offset="0%" stop-color="#E8C97A" stop-opacity="0.14"/>
            <stop offset="50%" stop-color="#D4A853" stop-opacity="0.04"/>
            <stop offset="100%" stop-color="#0A0C10" stop-opacity="0"/>
          </radialGradient>
          <radialGradient id="glowF1s" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#FFF5E0" stop-opacity="0.55"/>
            <stop offset="40%" stop-color="#E8C97A" stop-opacity="0.18"/>
            <stop offset="100%" stop-color="#D4A853" stop-opacity="0"/>
          </radialGradient>
        </defs>
        <rect width="200" height="200" rx="44" fill="#0A0C10"/>
        <circle cx="100" cy="100" r="90" fill="url(#bgF1s)"/>
        <circle cx="100" cy="108" r="34" fill="url(#glowF1s)"/>
        <path d="M 50 60 C 50 22, 150 22, 150 60" stroke="#D4A853" stroke-width="4.5" stroke-linecap="round" fill="none" opacity="0.90"/>
        <rect x="42" y="76" width="20" height="40" rx="8" fill="#D4A853" opacity="0.88"/>
        <rect x="138" y="76" width="20" height="40" rx="8" fill="#D4A853" opacity="0.88"/>
        <rect x="37" y="78" width="7" height="36" rx="3.5" fill="#B8933E" opacity="0.85"/>
        <rect x="156" y="78" width="7" height="36" rx="3.5" fill="#B8933E" opacity="0.85"/>
      </svg>
    </div>
    <span class="size-label">48dp</span>
  </div>

  <!-- ============ F2: Headphone Person ============ -->
  <div class="card">
    <span class="card-label">F2 · Headphone Person</span>
    <div class="icon-lg">
      <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="bgF2" cx="50%" cy="55%" r="50%">
            <stop offset="0%" stop-color="#E8C97A" stop-opacity="0.10"/>
            <stop offset="40%" stop-color="#D4A853" stop-opacity="0.04"/>
            <stop offset="100%" stop-color="#0A0C10" stop-opacity="0"/>
          </radialGradient>
          <radialGradient id="glowF2" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#FFF5E0" stop-opacity="0.50"/>
            <stop offset="30%" stop-color="#E8C97A" stop-opacity="0.18"/>
            <stop offset="100%" stop-color="#D4A853" stop-opacity="0"/>
          </radialGradient>
          <linearGradient id="hpGradF2" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#E8C97A"/>
            <stop offset="50%" stop-color="#D4A853"/>
            <stop offset="100%" stop-color="#B8933E"/>
          </linearGradient>
        </defs>
        <rect width="200" height="200" rx="44" fill="#0A0C10"/>
        <circle cx="100" cy="100" r="92" fill="url(#bgF2)"/>
        <circle cx="100" cy="108" r="30" fill="url(#glowF2)"/>

        <!-- Headband -->
        <path d="M 72 58 C 72 38, 128 38, 128 58" stroke="url(#hpGradF2)" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.92"/>

        <!-- Person head (circle) -->
        <circle cx="100" cy="78" r="18" fill="#D4A853" opacity="0.88"/>

        <!-- Person body / shoulders -->
        <path d="M 68 128 C 68 112, 78 104, 100 104 C 122 104, 132 112, 132 128" fill="#D4A853" opacity="0.50"/>
        <ellipse cx="100" cy="126" rx="30" ry="10" fill="#D4A853" opacity="0.45"/>

        <!-- Left earcup (overlapping head) -->
        <rect x="78" y="64" width="7" height="18" rx="3" fill="#D4A853" opacity="0.90"/>
        <!-- Right earcup -->
        <rect x="115" y="64" width="7" height="18" rx="3" fill="#D4A853" opacity="0.90"/>

        <!-- Cushion details -->
        <rect x="76" y="66" width="3" height="14" rx="1.5" fill="#B8933E" opacity="0.80"/>
        <rect x="121" y="66" width="3" height="14" rx="1.5" fill="#B8933E" opacity="0.80"/>

        <!-- Subtle spectrum below -->
        <rect x="88" y="142" width="1.8" height="6" rx="0.9" fill="#E8C97A" opacity="0.35"/>
        <rect x="92" y="138" width="1.8" height="10" rx="0.9" fill="#E8C97A" opacity="0.48"/>
        <rect x="96" y="134" width="1.8" height="14" rx="0.9" fill="#E8C97A" opacity="0.60"/>
        <rect x="100" y="132" width="1.8" height="16" rx="0.9" fill="#E8C97A" opacity="0.65"/>
        <rect x="104" y="134" width="1.8" height="14" rx="0.9" fill="#E8C97A" opacity="0.60"/>
        <rect x="108" y="138" width="1.8" height="10" rx="0.9" fill="#E8C97A" opacity="0.48"/>
        <rect x="112" y="142" width="1.8" height="6" rx="0.9" fill="#E8C97A" opacity="0.35"/>
      </svg>
    </div>
    <span class="tag">Character · Warm</span>
    <p class="desc">A tiny person silhouette wearing headphones, immersed in sound.</p>
    <div class="icon-sm">
      <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="bgF2s" cx="50%" cy="55%" r="50%">
            <stop offset="0%" stop-color="#E8C97A" stop-opacity="0.14"/>
            <stop offset="50%" stop-color="#D4A853" stop-opacity="0.04"/>
            <stop offset="100%" stop-color="#0A0C10" stop-opacity="0"/>
          </radialGradient>
          <radialGradient id="glowF2s" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#FFF5E0" stop-opacity="0.55"/>
            <stop offset="40%" stop-color="#E8C97A" stop-opacity="0.18"/>
            <stop offset="100%" stop-color="#D4A853" stop-opacity="0"/>
          </radialGradient>
        </defs>
        <rect width="200" height="200" rx="44" fill="#0A0C10"/>
        <circle cx="100" cy="100" r="90" fill="url(#bgF2s)"/>
        <circle cx="100" cy="108" r="34" fill="url(#glowF2s)"/>

        <path d="M 68 56 C 68 32, 132 32, 132 56" stroke="#D4A853" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.90"/>
        <circle cx="100" cy="76" r="20" fill="#D4A853" opacity="0.86"/>
        <path d="M 60 128 C 60 108, 74 100, 100 100 C 126 100, 140 108, 140 128" fill="#D4A853" opacity="0.48"/>
        <ellipse cx="100" cy="126" rx="34" ry="12" fill="#D4A853" opacity="0.42"/>

        <rect x="72" y="60" width="8" height="20" rx="4" fill="#D4A853" opacity="0.88"/>
        <rect x="120" y="60" width="8" height="20" rx="4" fill="#D4A853" opacity="0.88"/>
        <rect x="69" y="62" width="4" height="16" rx="2" fill="#B8933E" opacity="0.80"/>
        <rect x="127" y="62" width="4" height="16" rx="2" fill="#B8933E" opacity="0.80"/>
      </svg>
    </div>
    <span class="size-label">48dp</span>
  </div>

</div>

</body>
</html>
